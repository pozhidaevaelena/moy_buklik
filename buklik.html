<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Буклик</title>
</head>
<body>
    <h1>✨ Привет, я новый Буклик ✨</h1>
    <p>Этот файл называется buklik.html</p>
    <p>Если ты это видишь — GitHub работает.</p>
    <div id="story" style="border:2px solid orange; padding:20px; margin:20px;">📖 История</div>
    <div id="chat" style="border:1px solid gray; height:200px; overflow-y:auto; padding:10px;"></div>
    <input id="input" type="text" placeholder="Напиши..." style="width:200px;">
    <button onclick="send()">Отправить</button>

    <script>
        const chat = document.getElementById('chat');
        const storyDiv = document.getElementById('story');
        const input = document.getElementById('input');
        let step = 0, name = '', hero = '', place = '', friend = '';

        function add(msg) { chat.innerHTML += '<div>👉 ' + msg + '</div>'; }
        add('Буклик: Привет! Как тебя зовут?');

        window.send = function() {
            const text = input.value; input.value = '';
            add('Ты: ' + text);
            if (step === 0) { name = text; add('Буклик: Привет, ' + name + '! Кто герой?'); step = 1; }
            else if (step === 1) { hero = text; add('Буклик: Где происходит?'); step = 2; }
            else if (step === 2) { place = text; add('Буклик: Кто друг?'); step = 3; }
            else if (step === 3) { friend = text; storyDiv.innerText = 'Жила-была ' + hero + '. Друг — ' + friend + '. Место — ' + place + '.'; add('Буклик: ✨ История готова!'); step = 4; }
        };
    </script>
</body>
</html>
