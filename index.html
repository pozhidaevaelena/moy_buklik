<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Буклик</title>
    <style>
        body { background: #b8e1d9; font-family: Arial; text-align: center; padding: 30px; }
        .box {
            max-width: 600px;
            margin: 0 auto;
            background: #fff9e6;
            border-radius: 40px;
            padding: 30px;
            border: 4px solid #ffb27f;
        }
        .chat {
            background: white;
            border-radius: 30px;
            padding: 20px;
            height: 200px;
            overflow-y: auto;
            text-align: left;
            border: 3px solid #ffcf9a;
            margin: 20px 0;
        }
        input, button {
            padding: 15px;
            font-size: 1.2rem;
            border-radius: 40px;
            border: 3px solid #ffcf9a;
            margin: 5px;
        }
        button { background: #ffb27f; cursor: pointer; }
        .message { margin: 10px 0; }
    </style>
</head>
<body>
<div class="box">
    <h1>✨ Буклик ✨</h1>
    <div class="chat" id="chat"></div>
    <input type="text" id="input" placeholder="Напиши...">
    <button id="send">Отправить</button>
    <button id="mic">🎤</button>
</div>

<script>
    (function() {
        const chat = document.getElementById('chat');
        const input = document.getElementById('input');
        const send = document.getElementById('send');

        let step = 0;
        let name = '';
        let useSyllables = false;

        function add(sender, text) {
            const msg = document.createElement('div');
            msg.className = 'message';
            msg.innerHTML = `<strong>${sender}:</strong> ${text}`;
            chat.appendChild(msg);
            chat.scrollTop = chat.scrollHeight;
        }

        add('Буклик', 'Привет! Как тебя зовут?');

        send.onclick = () => {
            const text = input.value.trim();
            if (!text) return;
            input.value = '';
            add('Ты', text);

            if (step === 0) {
                name = text;
                add('Буклик', `Привет, ${name}! Тебе читать по слогам или целиком?`);
                step = 1;
            } else if (step === 1) {
                useSyllables = text.includes('слог');
                add('Буклик', 'Кто будет героем? (например, фея, дракон, девочка)');
                step = 2;
            } else if (step === 2) {
                add('Буклик', 'Где происходит история? (лес, замок, космос)');
                step = 3;
            } else if (step === 3) {
                add('Буклик', 'Кто друг героя?');
                step = 4;
            } else if (step === 4) {
                add('Буклик', '✨ История готова! Скоро здесь появится текст.');
                step = 5;
            }
        };

        if ('webkitSpeechRecognition' in window) {
            const rec = new webkitSpeechRecognition();
            rec.lang = 'ru-RU';
            rec.onresult = (e) => {
                input.value = e.results[0][0].transcript;
                send.click();
            };
            document.getElementById('mic').onclick = () => rec.start();
        }
    })();
</script>
</body>
</html>
