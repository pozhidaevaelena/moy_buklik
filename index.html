<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Буклик</title>
    <style>
        body { background: #7BC5AE; font-family: Arial; text-align: center; padding: 20px; }
        .box { max-width: 600px; margin: 0 auto; background: #FFF9E6; border-radius: 40px; padding: 30px; }
        .story { background: #FFF0D9; border-radius: 20px; padding: 20px; margin: 20px 0; font-size: 1.4rem; }
        .chat { background: white; border-radius: 20px; padding: 15px; height: 200px; overflow-y: auto; text-align: left; }
        .message { margin: 8px 0; }
        input, button { padding: 12px; font-size: 1.1rem; border-radius: 25px; border: 2px solid #FFCF9A; margin: 5px; }
        button { background: #FFB27F; cursor: pointer; }
    </style>
</head>
<body>
<div class="box">
    <h1>✨ Буклик ✨</h1>
    <div class="story" id="story">📖 Здесь появится твоя история...</div>
    <div class="chat" id="chat"></div>
    <input type="text" id="input" placeholder="Напиши...">
    <button onclick="sendMessage()">Отправить</button>
</div>

<script>
    const chat = document.getElementById('chat');
    const storyDiv = document.getElementById('story');
    const input = document.getElementById('input');

    let step = 0;
    let name = '', hero = '', place = '', friend = '';

    function addMessage(sender, text) {
        const msg = document.createElement('div');
        msg.className = 'message';
        msg.innerHTML = `<strong>${sender}:</strong> ${text}`;
        chat.appendChild(msg);
        chat.scrollTop = chat.scrollHeight;
    }

    addMessage('Буклик', 'Привет! Как тебя зовут?');

    window.sendMessage = function() {
        const text = input.value.trim();
        if (!text) return;
        input.value = '';
        addMessage('Ты', text);

        if (step === 0) {
            name = text;
            addMessage('Буклик', `Привет, ${name}! Кто герой?`);
            step = 1;
        } else if (step === 1) {
            hero = text;
            addMessage('Буклик', 'Где происходит?');
            step = 2;
        } else if (step === 2) {
            place = text;
            addMessage('Буклик', 'Кто друг?');
            step = 3;
        } else if (step === 3) {
            friend = text;
            let story = `Жила-была ${hero}. У неё был друг — ${friend}. Однажды они отправились в ${place}.`;
            storyDiv.innerText = story;
            addMessage('Буклик', '✨ Вот история!');
            step = 4;
        }
    };

    input.onkeypress = (e) => {
        if (e.key === 'Enter') sendMessage();
    };
</script>
</body>
</html>
