<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Буклик</title>
    <style>
        body {
            background: #7BC5AE;
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }
        .box {
            max-width: 600px;
            margin: 0 auto;
            background: #FFF9E6;
            border-radius: 40px;
            padding: 30px;
            border: 4px solid #FFB27F;
        }
        h1 {
            color: #3F2B1C;
            font-size: 2.5rem;
            text-shadow: 3px 3px 0 #F9D77E;
        }
        .story-block {
            background: #FFF0D9;
            border-radius: 30px;
            padding: 20px;
            margin: 20px 0;
            font-size: 1.5rem;
            border: 4px solid #FFB27F;
            min-height: 100px;
        }
        .chat {
            background: white;
            border-radius: 20px;
            padding: 15px;
            height: 200px;
            overflow-y: auto;
            border: 2px solid #FFCF9A;
            margin: 20px 0;
            text-align: left;
        }
        .message {
            margin: 8px 0;
        }
        input, button {
            padding: 12px;
            font-size: 1.1rem;
            border-radius: 25px;
            border: 2px solid #FFCF9A;
            margin: 5px;
        }
        button {
            background: #FFB27F;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>✨ Буклик ✨</h1>
        <div class="story-block" id="story">
            📖 Здесь появится твоя история...
        </div>
        <div class="chat" id="chat"></div>
        <input type="text" id="userInput" placeholder="Напиши...">
        <button id="send">Отправить</button>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const storyDiv = document.getElementById('story');
        const userInput = document.getElementById('userInput');
        const send = document.getElementById('send');

        let step = 0;
        let childName = '';
        let hero = '', place = '', friend = '';

        function addMessage(sender, text) {
            const msg = document.createElement('div');
            msg.className = 'message';
            msg.innerHTML = `<strong>${sender}:</strong> ${text}`;
            chat.appendChild(msg);
            chat.scrollTop = chat.scrollHeight;
        }

        addMessage('Буклик', '✨ Привет! Как тебя зовут?');

        send.onclick = () => {
            const text = userInput.value.trim();
            if (!text) return;
            addMessage('Ты', text);
            userInput.value = '';

            if (step === 0) {
                childName = text;
                addMessage('Буклик', `Приятно познакомиться, ${childName}! Кто будет героем истории?`);
                step = 1;
            } else if (step === 1) {
                hero = text;
                addMessage('Буклик', 'Где происходит история? (лес, замок, космос)');
                step = 2;
            } else if (step === 2) {
                place = text;
                addMessage('Буклик', 'Кто будет другом героя?');
                step = 3;
            } else if (step === 3) {
                friend = text;
                let story = `Жила-была ${hero}. У неё был друг — ${friend}. Однажды они отправились в ${place}, где их ждали удивительные приключения.`;
                storyDiv.innerText = story;
                addMessage('Буклик', '✨ Вот твоя история! Прочитай её вслух.');
                step = 4;
            }
        };

        userInput.onkeypress = (e) => {
            if (e.key === 'Enter') send.click();
        };
    </script>
</body>
</html>
