<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Привет! Я Буклик.</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body {
            background: #7BC5AE;
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }
        .app {
            max-width: 650px;
            margin: 0 auto;
            background: #FFF9E6;
            border-radius: 50px;
            padding: 30px;
            border: 4px solid #FFB27F;
        }
        h1 { color: #3F2B1C; font-size: 2.5rem; margin-bottom: 20px; }
        .mission {
            background: #FFE6D5;
            border-radius: 40px;
            padding: 15px;
            margin: 15px 0;
            border: 3px dashed #FFB27F;
            font-size: 1.3rem;
        }
        .character-img {
            max-width: 200px;
            border-radius: 40px;
            border: 4px solid #FFEAC1;
            margin: 10px auto;
            cursor: pointer;
        }
        .story-block {
            background: #FFF0D9;
            border-radius: 30px;
            padding: 20px;
            margin: 20px 0;
            font-size: 1.5rem;
            border: 4px solid #FFB27F;
            min-height: 120px;
            white-space: pre-wrap;
            text-align: left;
        }
        .picture-block {
            background: #FFD9C0;
            border-radius: 30px;
            padding: 20px;
            margin: 15px 0;
            border: 4px dashed #FFB27F;
            display: none;
        }
        .picture-block img {
            max-width: 100%;
            border-radius: 30px;
        }
        .chat {
            background: white;
            border-radius: 30px;
            padding: 20px;
            height: 250px;
            overflow-y: auto;
            border: 3px solid #FFCF9A;
            margin: 20px 0;
            text-align: left;
        }
        .message { margin: 10px 0; }
        .input-area {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        input {
            flex: 1;
            padding: 15px;
            font-size: 1.2rem;
            border-radius: 40px;
            border: 3px solid #FFCF9A;
        }
        button {
            padding: 15px 25px;
            font-size: 1.2rem;
            border-radius: 40px;
            border: 3px solid #FFEAA2;
            background: #FFB27F;
            cursor: pointer;
        }
        .mic { background: #A7D0CD; }
        .suggestions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 10px 0;
            justify-content: center;
        }
        .suggestion-btn {
            background: #FFF0D9;
            border: 2px solid #FFB27F;
            border-radius: 30px;
            padding: 10px 20px;
            font-size: 1.1rem;
            cursor: pointer;
        }
        #download-btn {
            background: #D9B8C4;
            margin: 15px auto;
            display: none;
            padding: 15px 30px;
            border-radius: 50px;
            border: 4px solid #FFB27F;
            cursor: pointer;
            width: fit-content;
        }
    </style>
</head>
<body>
<div class="app">
    <h1>Привет! Я Буклик.</h1>
    <div class="mission">
        Я помогаю придумывать волшебные истории,
        рисовать картинки и читать вслух.
    </div>
    <img src="moy_buklik.jpg" alt="Буклик" class="character-img" id="buklikImg">

    <div class="story-block" id="storyBlock">Здесь появится твоя история...</div>
    <div class="picture-block" id="pictureBlock">
        <div>Иллюстрация:</div>
        <img id="pictureImg" src="">
    </div>
    <div class="chat" id="chat"></div>
    
    <div class="suggestions" id="suggestions"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Напиши или нажми микрофон">
        <button id="sendBtn">Отправить</button>
        <button id="micBtn" class="mic">Микрофон</button>
    </div>

    <div id="download-btn">Скачать книгу</div>
</div>

<script>
    (function() {
        // ==================== НОВЫЙ URL API-ШЛЮЗА ====================
        const FUNCTION_URL = 'https://d5dt7ff51tpc9ldq1a3.kf692ffa.apigw.yandexcloud.net';
        // =============================================================

        const chat = document.getElementById('chat');
        const storyBlock = document.getElementById('storyBlock');
        const pictureBlock = document.getElementById('pictureBlock');
        const pictureImg = document.getElementById('pictureImg');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const micBtn = document.getElementById('micBtn');
        const downloadBtn = document.getElementById('download-btn');
        const suggestionsDiv = document.getElementById('suggestions');

        let step = 0;
        let childName = '';
        let childGender = '';
        let hero = '', place = '', friend = '';
        let fullStory = [];
        let currentParagraph = 0;
        let conversationHistory = [];

        addMessage('Буклик', 'Привет! Давай знакомиться. Как тебя зовут?');

        function addMessage(sender, text) {
            const msg = document.createElement('div');
            msg.className = 'message';
            msg.innerHTML = `<strong>${sender}:</strong> ${text}`;
            chat.appendChild(msg);
            chat.scrollTop = chat.scrollHeight;
        }

        function showSuggestions(options) {
            suggestionsDiv.innerHTML = '';
            options.forEach(opt => {
                const btn = document.createElement('span');
                btn.className = 'suggestion-btn';
                btn.innerText = opt;
                btn.onclick = () => {
                    userInput.value = opt;
                    sendBtn.click();
                };
                suggestionsDiv.appendChild(btn);
            });
        }

        function clearSuggestions() {
            suggestionsDiv.innerHTML = '';
        }

        function capitalizeFirstLetter(string) {
            return string.charAt(0).toUpperCase() + string.slice(1);
        }

        function normalizeHero(text, name, gender) {
            const lower = text.toLowerCase().trim();
            if (lower === 'я' || lower === 'я сама' || lower === 'я сам') {
                return gender === 'boy' ? `мальчик ${name}` : `девочка ${name}`;
            }
            return text;
        }

        async function callYandexGPT(prompt, system) {
            try {
                const response = await fetch(FUNCTION_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: prompt,
                        history: conversationHistory,
                        system: system
                    })
                });
                
                if (!response.ok) {
                    console.error('Статус ошибки:', response.status);
                    const errorText = await response.text();
                    console.error('Текст ошибки:', errorText);
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                let text = data.reply;
                
                if (!text || text === '...') {
                    console.error('Пустой ответ от функции');
                    return null;
                }
                
                text = capitalizeFirstLetter(text);
                if (data.history) {
                    conversationHistory = data.history;
                }
                return text;
            } catch (error) {
                console.error('Ошибка вызова функции:', error);
                return null;
            }
        }

        async function generatePicture(prompt) {
            pictureBlock.style.display = 'block';
            const images = [
                'https://via.placeholder.com/400x300/FFEAC1/FFB27F?text=Волшебный+лес',
                'https://via.placeholder.com/400x300/FFD9C0/FF9F6E?text=Замок+с+драконом',
                'https://via.placeholder.com/400x300/E6C5A8/8B5A2B?text=Космическое+путешествие',
                'https://via.placeholder.com/400x300/B8E1D9/3F6B5E?text=Друзья+в+пути'
            ];
            pictureImg.src = images[Math.floor(Math.random() * images.length)];
        }

        sendBtn.onclick = async () => {
            const text = userInput.value.trim();
            if (!text) return;
            userInput.value = '';
            addMessage('Ты', text);
            clearSuggestions();

            try {
                if (step === 0) {
                    childName = text;
                    addMessage('Буклик', `Приятно познакомиться, ${childName}! Ты мальчик или девочка?`);
                    showSuggestions(['мальчик', 'девочка']);
                    step = 1;
                }
                else if (step === 1) {
                    childGender = text.includes('мальчик') ? 'boy' : 'girl';
                    addMessage('Буклик', 'Кто будет главным героем?');
                    showSuggestions(['я', 'фея', 'дракон', 'принцесса', 'котёнок']);
                    step = 2;
                }
                else if (step === 2) {
                    hero = normalizeHero(text, childName, childGender);
                    addMessage('Буклик', 'Где происходит действие?');
                    showSuggestions(['в волшебном лесу', 'в замке', 'в космосе', 'на острове']);
                    step = 3;
                }
                else if (step === 3) {
                    place = text;
                    addMessage('Буклик', 'Кто друг героя?');
                    showSuggestions(['лисёнок', 'дракончик', 'фея', 'говорящий кот']);
                    step = 4;
                }
                else if (step === 4) {
                    friend = text;
                    
                    const prompt = `Напиши первый абзац волшебной сказки для девочки 7 лет. 
                        Главный герой: ${hero}. 
                        Место действия: ${place}. 
                        Друг героя: ${friend}. 
                        Напиши 3-4 предложения, красиво, с заглавной буквы, с волшебством. 
                        История должна начинаться с "Жила-была".`;
                    
                    const systemPrompt = 'Ты — детский писатель. Пиши красиво, грамотно, с волшебством.';
                    
                    addMessage('Буклик', '✨ Сейчас придумаю...');
                    const firstParagraph = await callYandexGPT(prompt, systemPrompt);
                    
                    if (firstParagraph) {
                        fullStory = [firstParagraph];
                        storyBlock.innerText = firstParagraph;
                        addMessage('Буклик', `Вот начало твоей сказки! Прочитай вслух, нажав на микрофон. Потом я нарисую картинку.`);
                        step = 5;
                    } else {
                        addMessage('Буклик', 'Что-то пошло не так. Давай попробуем ещё раз.');
                    }
                }
                else if (step === 5) {
                    if (fullStory.length > 0) {
                        await generatePicture(fullStory[currentParagraph] || 'Сказка');
                        addMessage('Буклик', `Вот иллюстрация! Что будет дальше? Ты можешь выбрать.`);
                        showSuggestions(['нашли клад', 'встретили волшебника', 'попали в подземелье', 'спасли друга']);
                        step = 6;
                    }
                }
                else if (step === 6) {
                    const nextPrompt = `Продолжи сказку про ${hero} и ${friend}. 
                        Учти, что ребёнок сказал: "${text}". 
                        Напиши следующий абзац (3-4 предложения), развивай сюжет, добавляй волшебство.`;
                    
                    addMessage('Буклик', '✨ Сейчас придумаю продолжение...');
                    const nextParagraph = await callYandexGPT(nextPrompt, 'Ты — детский писатель. Продолжи сказку.');
                    
                    if (nextParagraph) {
                        fullStory.push(nextParagraph);
                        storyBlock.innerText = nextParagraph;
                        currentParagraph++;
                        
                        if (currentParagraph >= 2) {
                            const endPrompt = `Напиши счастливый конец сказки про ${hero} и ${friend}. 
                                Они возвращаются домой, их ждут, всё хорошо. 3-4 предложения, тепло, волшебно.`;
                            
                            addMessage('Буклик', '✨ Сейчас придумаю красивый финал...');
                            const ending = await callYandexGPT(endPrompt, 'Ты — детский писатель. Напиши тёплый финал.');
                            
                            if (ending) {
                                fullStory.push(ending);
                                storyBlock.innerText = ending;
                                addMessage('Буклик', 'Вот и подошло наше приключение к концу. Ты настоящий сказочник!');
                                downloadBtn.style.display = 'inline-block';
                                step = 7;
                            }
                        } else {
                            addMessage('Буклик', 'Прочитай этот абзац вслух, и я нарисую картинку.');
                            step = 5;
                        }
                    }
                }
            } catch (error) {
                console.error('Ошибка:', error);
                addMessage('Буклик', 'Что-то пошло не так. Давай попробуем ещё раз.');
            }
        };

        if ('webkitSpeechRecognition' in window) {
            const rec = new webkitSpeechRecognition();
            rec.lang = 'ru-RU';
            rec.continuous = false;
            rec.interimResults = false;
            rec.onresult = (e) => {
                userInput.value = e.results[0][0].transcript;
                sendBtn.click();
            };
            rec.onerror = (e) => {
                console.error('Ошибка микрофона:', e);
                addMessage('Буклик', 'Не удалось распознать речь. Попробуй ещё раз или напиши.');
            };
            micBtn.onclick = () => rec.start();
        } else {
            micBtn.style.display = 'none';
        }

        downloadBtn.onclick = async () => {
            try {
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF();
                
                const img = document.getElementById('buklikImg');
                const canvas = await html2canvas(img);
                const imgData = canvas.toDataURL('image/jpeg');
                pdf.addImage(imgData, 'JPEG', 10, 10, 40, 40);
                
                pdf.setFontSize(20);
                pdf.text('Волшебная книга', 60, 30);
                pdf.setFontSize(12);
                pdf.text(`Автор: ${childName}`, 60, 40);
                
                let y = 60;
                pdf.setFontSize(14);
                fullStory.forEach((p, i) => {
                    if (y > 270) {
                        pdf.addPage();
                        y = 20;
                    }
                    const lines = pdf.splitTextToSize(p, 170);
                    pdf.text(lines, 20, y);
                    y += lines.length * 7 + 5;
                });
                
                pdf.save('moja_volshebnaja_kniga.pdf');
            } catch (error) {
                console.error('Ошибка при создании PDF:', error);
                alert('Не удалось создать PDF. Попробуй ещё раз.');
            }
        };
    })();
</script>
</body>
</html>
