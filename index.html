<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>✨ Буклик ✨</title>
    <style>
        body {
            background: #b8e1d9;
            font-family: 'Comic Sans MS', cursive;
            text-align: center;
            padding: 30px;
        }
        .app {
            max-width: 600px;
            margin: 0 auto;
            background: #fff9e6;
            border-radius: 60px;
            padding: 30px;
            border: 4px solid #ffb27f;
        }
        h1 {
            color: #3f2b1c;
            text-shadow: 3px 3px 0 #f9d77e;
        }
        .story-block {
            background: #fff0d9;
            border-radius: 40px;
            padding: 20px;
            margin: 20px 0;
            font-size: 1.8rem;
            border: 3px solid #ffb27f;
        }
        .chat-box {
            background: white;
            border-radius: 30px;
            padding: 15px;
            height: 200px;
            overflow-y: auto;
            text-align: left;
            border: 3px solid #ffcf9a;
        }
        .input-area {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        input {
            flex: 1;
            padding: 15px;
            border-radius: 40px;
            border: 3px solid #ffcf9a;
            font-size: 1.3rem;
        }
        button {
            background: #ffb27f;
            border: none;
            padding: 15px 20px;
            border-radius: 50px;
            font-size: 1.5rem;
            border: 3px solid #ffeaa2;
            cursor: pointer;
        }
        .mic {
            background: #a7d0cd;
        }
    </style>
</head>
<body>
<div class="app">
    <h1>✨ Привет, я Буклик ✨</h1>
    <div class="story-block" id="story">📖 Здесь появится история...</div>
    <div class="chat-box" id="chat"></div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Напиши или нажми 🎤">
        <button id="sendBtn">📬</button>
        <button id="micBtn" class="mic">🎤</button>
    </div>
</div>

<script>
    // Упрощённая версия — работает сразу
    (function() {
        const storyDiv = document.getElementById('story');
        const chatDiv = document.getElementById('chat');
        const input = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const micBtn = document.getElementById('micBtn');

        let step = 0;
        let childName = '';
        let useSyllables = false;
        let hero = '', place = '', friend = '';

        function addMessage(sender, text) {
            const msg = document.createElement('div');
            msg.innerHTML = `<strong>${sender}:</strong> ${text}`;
            chatDiv.appendChild(msg);
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }

        addMessage('Буклик', '✨ Привет! Давай знакомиться. Как тебя зовут?');

        sendBtn.onclick = () => {
            const text = input.value.trim();
            if (!text) return;
            input.value = '';

            addMessage('Ты', text);

            if (step === 0) {
                childName = text;
                addMessage('Буклик', `Приятно познакомиться, ${childName}! Тебе удобнее читать целиком или по слогам?`);
                step = 1;
            } else if (step === 1) {
                useSyllables = text.includes('слог');
                addMessage('Буклик', useSyllables ? 'Буду писать по слогам! Кто герой?' : 'Читаем целиком! Кто герой?');
                step = 2;
            } else if (step === 2) {
                hero = text;
                addMessage('Буклик', 'Где происходит история? (лес, замок, космос)');
                step = 3;
            } else if (step === 3) {
                place = text;
                addMessage('Буклик', 'Кто друг героя?');
                step = 4;
            } else if (step === 4) {
                friend = text;
                let story = `Жила-была ${hero}. У неё был друг — ${friend}. Однажды они отправились в ${place}, где их ждали удивительные приключения.`;
                if (useSyllables) {
                    story = story.replace(/([аеёиоуыэюя])/gi, '$1 ');
                }
                storyDiv.innerText = story;
                addMessage('Буклик', '✨ Вот твоя история! Прочитай её вслух.');
                step = 5;
            } else {
                addMessage('Буклик', 'Продолжай, мне интересно!');
            }
        };

        // Микрофон
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            const rec = new SR();
            rec.lang = 'ru-RU';
            rec.onresult = (e) => {
                input.value = e.results[0][0].transcript;
                sendBtn.click();
            };
            micBtn.onclick = () => rec.start();
        } else {
            micBtn.style.display = 'none';
        }
    })();
</script>
</body>
</html>
