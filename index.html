<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Буклик</title>
    <style>
        body {
            background: #7BC5AE;
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .box {
            max-width: 600px;
            margin: 0 auto;
            background: #FFF9E6;
            border-radius: 40px;
            padding: 25px;
            border: 4px solid #FFB27F;
        }
        h1 {
            color: #3F2B1C;
            font-size: 2.5rem;
            text-shadow: 3px 3px 0 #F9D77E;
            margin: 0 0 20px;
        }
        .story-block {
            background: #FFF0D9;
            border-radius: 30px;
            padding: 25px;
            margin: 20px 0;
            font-size: 1.6rem;
            line-height: 1.6;
            border: 4px solid #FFB27F;
            color: #2B1404;
            min-height: 100px;
        }
        .chat {
            background: white;
            border-radius: 30px;
            padding: 20px;
            height: 250px;
            overflow-y: auto;
            text-align: left;
            border: 3px solid #FFCF9A;
            margin: 20px 0;
        }
        .message {
            margin: 12px 0;
            font-size: 1.2rem;
        }
        .message strong {
            color: #1F4E3D;
        }
        .controls {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        input {
            flex: 1;
            padding: 15px;
            font-size: 1.2rem;
            border-radius: 40px;
            border: 3px solid #FFCF9A;
            outline: none;
        }
        button {
            padding: 15px 25px;
            font-size: 1.2rem;
            border-radius: 40px;
            border: 3px solid #FFEAA2;
            background: #FFB27F;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 0 #A65629;
            transition: 0.1s;
        }
        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #A65629;
        }
        #mic {
            background: #A7D0CD;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>✨ Буклик ✨</h1>
        
        <div class="story-block" id="story">
            📖 Здесь появится твоя история...
        </div>

        <div class="chat" id="chat"></div>

        <div class="controls">
            <input type="text" id="userInput" placeholder="Напиши или нажми 🎤" autocomplete="off">
            <button id="send">📬 Отправить</button>
            <button id="mic">🎤</button>
        </div>
    </div>

    <script>
        // Получаем элементы
        const chat = document.getElementById('chat');
        const storyDiv = document.getElementById('story');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('send');
        const micBtn = document.getElementById('mic');

        // Переменные для хранения данных
        let step = 0;
        let childName = '';
        let hero = '';
        let place = '';
        let friend = '';

        // Функция добавления сообщения в чат
        function addMessage(sender, text) {
            const msg = document.createElement('div');
            msg.className = 'message';
            msg.innerHTML = `<strong>${sender}:</strong> ${text}`;
            chat.appendChild(msg);
            chat.scrollTop = chat.scrollHeight;
        }

        // Стартовое сообщение
        addMessage('Буклик', '✨ Привет! Давай знакомиться. Как тебя зовут?');

        // Обработка отправки сообщения
        sendBtn.onclick = () => {
            const text = userInput.value.trim();
            if (text === '') return;

            // Показываем сообщение пользователя
            addMessage('Ты', text);
            userInput.value = '';

            // Логика диалога
            if (step === 0) {
                // Запомнили имя
                childName = text;
                addMessage('Буклик', `Приятно познакомиться, ${childName}! Кто будет главным героем истории? (например: фея, дракон, девочка)`);
                step = 1;
            } 
            else if (step === 1) {
                // Запомнили героя
                hero = text;
                addMessage('Буклик', 'Отлично! А где происходит история? (лес, замок, космос)');
                step = 2;
            }
            else if (step === 2) {
                // Запомнили место
                place = text;
                addMessage('Буклик', 'Чудесно! И кто будет другом героя? (например: лисёнок, дракончик, фея)');
                step = 3;
            }
            else if (step === 3) {
                // Запомнили друга и создаём историю
                friend = text;
                
                // Формируем историю
                let story = `Жила-была ${hero}. У неё был друг — ${friend}. Однажды они отправились в ${place}, где их ждали удивительные приключения.`;
                
                // Показываем историю в отдельном блоке
                storyDiv.innerText = story;
                
                // Сообщаем об этом
                addMessage('Буклик', '✨ Вот твоя история! Ты можешь прочитать её вслух.');
                step = 4;
            }
            else {
                // Если история уже создана
                addMessage('Буклик', 'Хочешь придумать новую историю? Напиши "да" и мы начнём сначала.');
            }
        };

        // Обработка микрофона
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const recognition = new SpeechRecognition();
            recognition.lang = 'ru-RU';
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onresult = (event) => {
                userInput.value = event.results[0][0].transcript;
                sendBtn.click();
            };

            micBtn.onclick = () => {
                recognition.start();
            };
        } else {
            micBtn.style.display = 'none';
        }

        // Отправка по Enter
        userInput.onkeypress = (e) => {
            if (e.key === 'Enter') {
                sendBtn.click();
            }
        };
    </script>
</body>
</html>
