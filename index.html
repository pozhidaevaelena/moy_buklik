<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Волшебный Буклик ✨</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Comic Sans MS', cursive, sans-serif; }
        body {
            background: linear-gradient(145deg, #7BC5AE 0%, #B8E1D9 50%, #E6C5A8 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .app {
            max-width: 750px;
            width: 100%;
            background: rgba(255, 248, 235, 0.3);
            backdrop-filter: blur(8px);
            border-radius: 70px 70px 50px 50px;
            padding: 30px 20px 40px;
            box-shadow: 0 30px 50px rgba(92,55,20,0.3);
            border: 3px solid rgba(255,250,220,0.9);
            text-align: center;
        }
        h1 {
            font-size: 2.8rem;
            color: #3F2B1C;
            text-shadow: 4px 4px 0 #F9D77E;
            background: #FFF5E0;
            display: inline-block;
            padding: 12px 35px;
            border-radius: 90px;
            margin-bottom: 15px;
            border: 4px solid #FFCF9A;
        }
        .character-img {
            max-width: 220px;
            border-radius: 50px;
            border: 5px solid #FFEAC1;
            filter: drop-shadow(0 15px 20px rgba(110,70,20,0.2));
            animation: float 4s ease-in-out infinite;
            margin: 10px auto 20px;
        }
        @keyframes float { 50% { transform: translateY(-10px); } }
        
        .mission {
            background: rgba(255, 245, 215, 0.8);
            backdrop-filter: blur(2px);
            border-radius: 60px;
            padding: 18px 20px;
            margin: 0 10px 25px;
            border: 3px dashed #F1C78C;
            font-size: 1.5rem;
            color: #1F4E3D;
            line-height: 1.8;
            box-shadow: inset 0 0 15px #fff9d7;
        }

        .mode-tabs {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin: 30px 0 20px;
            flex-wrap: wrap;
        }
        .mode-btn {
            background: #FFEAC1;
            border: 4px solid #FFB27F;
            padding: 15px 40px;
            border-radius: 70px;
            font-size: 1.8rem;
            font-weight: bold;
            color: #3F2B1C;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 7px 0 #A65629;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .mode-btn:active { transform: translateY(4px); box-shadow: 0 3px 0 #A65629; }
        .mode-btn.active {
            background: #FFB27F;
            color: white;
            border-color: #A65629;
        }

        .mode-content { display: none; margin-top: 20px; }
        .mode-content.active { display: block; }

        .story-block {
            background: #FFF9E6;
            border-radius: 40px;
            padding: 25px;
            margin: 20px 0;
            border: 4px solid #FFB27F;
            font-size: 1.8rem;
            line-height: 2.2;
            color: #2B1404;
            box-shadow: inset 0 0 15px #FFEAC1;
            word-break: break-word;
        }

        .chat-box {
            background: rgba(255,255,240,0.9);
            border-radius: 30px;
            padding: 20px;
            max-height: 300px;
            overflow-y: auto;
            border: 3px solid #FFCF9A;
            margin: 20px 0;
            text-align: left;
            font-size: 1.3rem;
        }
        .message { margin: 10px 0; }
        .message.user { text-align: right; color: #2B1404; }
        .message.bot { text-align: left; color: #1F4E3D; }

        .input-area {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        #simpleInput, #creativeInput {
            flex: 1;
            padding: 15px 20px;
            border-radius: 50px;
            border: 3px solid #FFCF9A;
            font-size: 1.3rem;
            min-width: 200px;
        }
        .btn {
            background: #FFB27F;
            border: none;
            padding: 15px 25px;
            border-radius: 60px;
            font-size: 1.5rem;
            font-weight: bold;
            border: 3px solid #FFEAA2;
            cursor: pointer;
            box-shadow: 0 6px 0 #A65629;
            transition: 0.07s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 70px;
        }
        .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #A65629; }
        .btn.mic { background: #A7D0CD; }

        .hero-options {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 15px 0;
            justify-content: center;
        }
        .hero-option {
            background: white;
            border: 3px solid #FFB27F;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 1.4rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        @media (max-width: 550px) {
            h1 { font-size: 2rem; padding: 10px 20px; }
            .mission { font-size: 1.2rem; }
            .mode-btn { font-size: 1.4rem; padding: 10px 20px; }
            .story-block { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
<div class="app">
    <h1>✨ Привет, я Буклик ✨</h1>
    <img src="moy_buklik.jpg" alt="Буклик" class="character-img">

    <div class="mission">
        <span>🌟</span> Я помогаю придумывать волшебные истории<br>
        <span>🎨</span> рисовать картинки и <span>📖</span> читать вслух
    </div>

    <div class="mode-tabs">
        <div class="mode-btn active" data-mode="simple">⭐ Простой</div>
        <div class="mode-btn" data-mode="creative">✨ Творческий</div>
    </div>

    <!-- ПРОСТОЙ РЕЖИМ -->
    <div id="simpleMode" class="mode-content active">
        <div class="story-block" id="simpleStory">📖 Здесь появится твоя история...</div>
        <div class="chat-box" id="simpleChat"></div>
        <div class="input-area">
            <input type="text" id="simpleInput" placeholder="Напиши или нажми 🎤">
            <button class="btn" id="simpleSend">📬</button>
            <button class="btn mic" id="simpleMic">🎤</button>
        </div>
    </div>

    <!-- ТВОРЧЕСКИЙ РЕЖИМ -->
    <div id="creativeMode" class="mode-content">
        <div class="story-block" id="creativeStory">📖 Здесь появится твоя история...</div>
        <div class="chat-box" id="creativeChat"></div>
        <div class="input-area">
            <input type="text" id="creativeInput" placeholder="Напиши или нажми 🎤">
            <button class="btn" id="creativeSend">📬</button>
            <button class="btn mic" id="creativeMic">🎤</button>
        </div>
    </div>
</div>

<script>
    (function() {
        const STORAGE_NAME = 'buklikChildName';
        let childName = localStorage.getItem(STORAGE_NAME) || '';
        let useSyllables = false;

        // Элементы
        const modeBtns = document.querySelectorAll('.mode-btn');
        const simpleMode = document.getElementById('simpleMode');
        const creativeMode = document.getElementById('creativeMode');

        // Простой режим
        const simple = {
            story: document.getElementById('simpleStory'),
            chat: document.getElementById('simpleChat'),
            input: document.getElementById('simpleInput'),
            sendBtn: document.getElementById('simpleSend'),
            micBtn: document.getElementById('simpleMic'),
            step: 0,
            hero: '', place: '', friend: ''
        };

        // Творческий режим
        const creative = {
            story: document.getElementById('creativeStory'),
            chat: document.getElementById('creativeChat'),
            input: document.getElementById('creativeInput'),
            sendBtn: document.getElementById('creativeSend'),
            micBtn: document.getElementById('creativeMic'),
            step: 0,
            hero: '', place: '', friend: '',
            lastParagraph: '', pendingEdit: false
        };

        // Переключение режимов — ИСПРАВЛЕНО
        modeBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                // Убираем активный класс у всех
                modeBtns.forEach(b => b.classList.remove('active'));
                // Добавляем текущей кнопке
                btn.classList.add('active');
                
                // Переключаем видимость режимов
                if (btn.dataset.mode === 'simple') {
                    simpleMode.classList.add('active');
                    creativeMode.classList.remove('active');
                } else {
                    creativeMode.classList.add('active');
                    simpleMode.classList.remove('active');
                }
            });
        });

        // Микрофон
        function initMic(inputField, sendCallback) {
            if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
                return null;
            }
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const recognition = new SpeechRecognition();
            recognition.lang = 'ru-RU';
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onresult = (event) => {
                const text = event.results[0][0].transcript;
                inputField.value = text;
                sendCallback();
            };

            recognition.onerror = () => {
                alert('Не расслышал, попробуй ещё раз или напиши');
            };

            return recognition;
        }

        function addMessage(chatDiv, sender, text) {
            const msg = document.createElement('div');
            msg.className = `message ${sender}`;
            msg.innerHTML = `<strong>${sender === 'user' ? 'Ты' : 'Буклик'}:</strong> ${text}`;
            chatDiv.appendChild(msg);
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }

        // Разбивка по слогам через ПРОБЕЛЫ
        function toSyllables(text) {
            return text.replace(/([аеёиоуыэюя])(?![аеёиоуыэюя])/gi, '$1 ').replace(/\s+/g, ' ').trim();
        }

        // Простой режим
        async function handleSimple(text) {
            addMessage(simple.chat, 'user', text);

            if (!childName) {
                childName = text;
                localStorage.setItem(STORAGE_NAME, text);
                addMessage(simple.chat, 'bot', `Приятно познакомиться, ${childName}! Тебе удобнее читать текст целиком или по слогам? (напиши "целиком" или "по слогам")`);
                simple.step = 1;
                return;
            }

            if (simple.step === 1) {
                useSyllables = text.toLowerCase().includes('слог');
                addMessage(simple.chat, 'bot', useSyllables ? 'Хорошо, буду писать по слогам! Кто будет главным героем?' : 'Отлично, читаем целиком! Кто будет главным героем?');
                simple.step = 2;
                return;
            }

            if (simple.step === 2) {
                simple.hero = text;
                addMessage(simple.chat, 'bot', 'Где происходит история? (лес, замок, космос)');
                simple.step = 3;
            } else if (simple.step === 3) {
                simple.place = text;
                addMessage(simple.chat, 'bot', 'Кто будет другом героя?');
                simple.step = 4;
            } else if (simple.step === 4) {
                simple.friend = text;
                let story = `Жила-была ${simple.hero}. У неё был друг — ${simple.friend}. Однажды они отправились в ${simple.place}, где их ждали удивительные приключения.`;
                if (useSyllables) story = toSyllables(story);
                simple.story.innerText = story;
                addMessage(simple.chat, 'bot', '✨ Вот твоя история! Прочитай её вслух.');
                simple.step = 5;
            }
        }

        // Творческий режим
        async function handleCreative(text) {
            addMessage(creative.chat, 'user', text);

            if (!childName) {
                childName = text;
                localStorage.setItem(STORAGE_NAME, text);
                addMessage(creative.chat, 'bot', `Приятно познакомиться, ${childName}! Кто будет героем истории? (выбери или придумай)`);
                showHeroOptions();
                creative.step = 1;
                return;
            }

            if (creative.step === 1) {
                creative.hero = text;
                addMessage(creative.chat, 'bot', 'Где происходит история?');
                creative.step = 2;
            } else if (creative.step === 2) {
                creative.place = text;
                addMessage(creative.chat, 'bot', 'Кто друг героя?');
                creative.step = 3;
            } else if (creative.step === 3) {
                creative.friend = text;
                let story = `Жила-была ${creative.hero}. У неё был друг — ${creative.friend}. Однажды они отправились в ${creative.place}, где их ждали удивительные приключения.`;
                creative.lastParagraph = story;
                creative.story.innerText = story;
                addMessage(creative.chat, 'bot', '✨ Вот начало! Если хочешь исправить, скажи "исправь".');
                creative.step = 4;
            } else if (creative.step === 4) {
                if (text.toLowerCase().includes('исправь')) {
                    creative.pendingEdit = true;
                    addMessage(creative.chat, 'bot', 'Что исправить?');
                } else if (creative.pendingEdit) {
                    creative.lastParagraph = text;
                    creative.story.innerText = text;
                    creative.pendingEdit = false;
                    addMessage(creative.chat, 'bot', 'Готово!');
                }
            }
        }

        function showHeroOptions() {
            const opts = ['🧚 фея', '🐉 дракон', '🦊 лисёнок', '🧙 волшебница', '🌸 принцесса', '✨ другой'];
            const div = document.createElement('div');
            div.className = 'hero-options';
            opts.forEach(o => {
                const b = document.createElement('span');
                b.className = 'hero-option';
                b.innerText = o;
                b.onclick = () => {
                    creative.input.value = o.replace(/[^а-яА-ЯёЁ]/g, '');
                    creative.sendBtn.click();
                };
                div.appendChild(b);
            });
            creative.chat.appendChild(div);
        }

        // Отправка
        simple.sendBtn.onclick = () => {
            const val = simple.input.value.trim();
            if (val) {
                handleSimple(val);
                simple.input.value = '';
            }
        };
        creative.sendBtn.onclick = () => {
            const val = creative.input.value.trim();
            if (val) {
                handleCreative(val);
                creative.input.value = '';
            }
        };

        // Микрофоны
        const micSimple = initMic(simple.input, () => simple.sendBtn.click());
        if (micSimple) simple.micBtn.onclick = () => micSimple.start();

        const micCreative = initMic(creative.input, () => creative.sendBtn.click());
        if (micCreative) creative.micBtn.onclick = () => micCreative.start();

        // Стартовое приветствие
        if (childName) {
            addMessage(simple.chat, 'bot', `С возвращением, ${childName}! Выбери режим.`);
            addMessage(creative.chat, 'bot', `С возвращением, ${childName}! Выбери режим.`);
        } else {
            addMessage(simple.chat, 'bot', '✨ Привет! Давай знакомиться. Как тебя зовут?');
        }
    })();
</script>
</body>
</html>
