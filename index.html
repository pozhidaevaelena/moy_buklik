<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Буклик — волшебный друг ✨</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Comic Sans MS', cursive, sans-serif; }
        body {
            background: linear-gradient(145deg, #7BC5AE 0%, #B8E1D9 50%, #E6C5A8 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .app {
            max-width: 700px;
            width: 100%;
            background: rgba(255, 248, 235, 0.3);
            backdrop-filter: blur(8px);
            border-radius: 70px 70px 50px 50px;
            padding: 30px 25px 40px;
            box-shadow: 0 30px 50px rgba(92,55,20,0.3);
            border: 3px solid rgba(255,250,220,0.9);
            text-align: center;
        }
        h1 {
            font-size: 2.8rem;
            color: #3F2B1C;
            text-shadow: 4px 4px 0 #F9D77E;
            background: #FFF5E0;
            display: inline-block;
            padding: 12px 35px;
            border-radius: 90px;
            margin-bottom: 20px;
            border: 4px solid #FFCF9A;
        }
        .character-img {
            max-width: 200px;
            border-radius: 50px;
            border: 5px solid #FFEAC1;
            filter: drop-shadow(0 15px 20px rgba(110,70,20,0.2));
            animation: float 4s ease-in-out infinite;
            margin: 10px auto 20px;
        }
        @keyframes float { 50% { transform: translateY(-10px); } }
        .mission {
            background: rgba(255, 245, 215, 0.8);
            backdrop-filter: blur(2px);
            border-radius: 60px;
            padding: 18px 20px;
            margin: 0 10px 25px;
            border: 3px dashed #F1C78C;
            font-size: 1.3rem;
            color: #1F4E3D;
            line-height: 1.6;
        }
        .story-block {
            background: #FFF9E6;
            border-radius: 40px;
            padding: 25px;
            margin: 20px 0;
            border: 4px solid #FFB27F;
            font-size: 1.5rem;
            line-height: 1.8;
            color: #2B1404;
            box-shadow: inset 0 0 15px #FFEAC1;
            text-align: left;
        }
        .picture-block {
            background: #FFD9C0;
            border-radius: 30px;
            padding: 20px;
            margin: 15px 0;
            border: 4px dashed #FFB27F;
            display: none;
            text-align: center;
        }
        .picture-block img {
            max-width: 100%;
            border-radius: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .chat {
            background: rgba(255,255,240,0.9);
            border-radius: 30px;
            padding: 20px;
            height: 250px;
            overflow-y: auto;
            border: 3px solid #FFCF9A;
            margin: 20px 0;
            text-align: left;
            font-size: 1.2rem;
        }
        .message { margin: 10px 0; }
        .message.user { text-align: right; color: #2B1404; }
        .message.bot { text-align: left; color: #1F4E3D; }
        .input-area {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        input {
            flex: 1;
            padding: 15px;
            font-size: 1.2rem;
            border-radius: 40px;
            border: 3px solid #FFCF9A;
            outline: none;
        }
        button {
            padding: 15px 25px;
            font-size: 1.2rem;
            border-radius: 40px;
            border: 3px solid #FFEAA2;
            background: #FFB27F;
            cursor: pointer;
            font-weight: bold;
            transition: 0.1s;
            box-shadow: 0 4px 0 #A65629;
        }
        button:active { transform: translateY(3px); box-shadow: 0 1px 0 #A65629; }
        .mic { background: #A7D0CD; }
        .suggestions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 15px 0;
            justify-content: center;
        }
        .suggestion-btn {
            background: #FFF0D9;
            border: 2px solid #FFB27F;
            border-radius: 40px;
            padding: 10px 20px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.1s;
        }
        .suggestion-btn:hover { background: #FFB27F; color: white; }
        #download-btn {
            background: #D9B8C4;
            margin: 20px auto 0;
            display: none;
            padding: 15px 30px;
            border-radius: 60px;
            border: 4px solid #FFB27F;
            cursor: pointer;
            width: fit-content;
            font-weight: bold;
        }
        @media (max-width: 550px) {
            h1 { font-size: 2.2rem; }
            .mission { font-size: 1.1rem; }
            .story-block { font-size: 1.3rem; }
            button { padding: 12px 20px; font-size: 1rem; }
        }
    </style>
</head>
<body>
<div class="app">
    <h1>✨ Привет, я Буклик ✨</h1>
    <div class="mission">
        Я помогаю придумывать волшебные истории,<br>
        рисовать картинки и читать вслух.
    </div>
    <img src="moy_buklik.jpg" alt="Буклик" class="character-img" id="buklikImg">

    <div class="story-block" id="storyBlock">📖 Здесь появится твоя история...</div>
    <div class="picture-block" id="pictureBlock">
        <div>🎨 Волшебная картинка создаётся...</div>
        <img id="pictureImg" src="" alt="Иллюстрация">
    </div>
    <div class="chat" id="chat"></div>
    
    <div class="suggestions" id="suggestions"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Напиши или нажми микрофон">
        <button id="sendBtn">📬 Отправить</button>
        <button id="micBtn" class="mic">🎤 Микрофон</button>
    </div>

    <div id="download-btn">📥 Скачать книгу</div>
</div>

<script>
    (function() {
        // ==================== URL СЕРВЕРА ====================
        const API_URL = 'https://examples-beta-murex.vercel.app';
        // ====================================================

        // DOM элементы
        const chat = document.getElementById('chat');
        const storyBlock = document.getElementById('storyBlock');
        const pictureBlock = document.getElementById('pictureBlock');
        const pictureImg = document.getElementById('pictureImg');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const micBtn = document.getElementById('micBtn');
        const downloadBtn = document.getElementById('download-btn');
        const suggestionsDiv = document.getElementById('suggestions');

        // Состояние игры
        let step = 0;
        let childName = '';
        let childGender = '';
        let hero = '', place = '', friend = '';
        let fullStory = [];
        let currentParagraph = 0;
        let conversationHistory = [];

        // Функции интерфейса
        function addMessage(sender, text) {
            const msg = document.createElement('div');
            msg.className = `message ${sender === 'Буклик' ? 'bot' : 'user'}`;
            msg.innerHTML = `<strong>${sender}:</strong> ${text}`;
            chat.appendChild(msg);
            chat.scrollTop = chat.scrollHeight;
        }

        function showSuggestions(options) {
            suggestionsDiv.innerHTML = '';
            options.forEach(opt => {
                const btn = document.createElement('span');
                btn.className = 'suggestion-btn';
                btn.innerText = opt;
                btn.onclick = () => {
                    userInput.value = opt;
                    sendBtn.click();
                };
                suggestionsDiv.appendChild(btn);
            });
        }

        function clearSuggestions() { suggestionsDiv.innerHTML = ''; }
        function capitalizeFirstLetter(str) { return str.charAt(0).toUpperCase() + str.slice(1); }

        function normalizeHero(text, name, gender) {
            const lower = text.toLowerCase().trim();
            if (lower === 'я' || lower === 'я сама' || lower === 'я сам') {
                return gender === 'boy' ? `мальчик ${name}` : `девочка ${name}`;
            }
            return text;
        }

        // Вызов YandexGPT через сервер
        async function callYandexGPT(prompt, system) {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: prompt,
                        history: conversationHistory,
                        system: system
                    })
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                let text = data.reply;
                if (!text || text === '...') return null;
                text = capitalizeFirstLetter(text);
                if (data.history) conversationHistory = data.history;
                return text;
            } catch (error) {
                console.error('Ошибка YandexGPT:', error);
                return null;
            }
        }

        // ========== ИСПРАВЛЕННАЯ ФУНКЦИЯ ДЛЯ КАРТИНОК ==========
        async function generatePicture(prompt) {
            console.log('🔍 generatePicture вызвана! Промпт:', prompt);
            
            pictureBlock.style.display = 'block';
            pictureImg.src = '';
            const imgDiv = pictureBlock.querySelector('div');
            if (imgDiv) imgDiv.innerText = '🎨 Волшебная картинка создаётся...';

            // Правильное формирование URL (без model=flux)
            const encodedPrompt = encodeURIComponent(prompt);
            const imageUrl = `https://image.pollinations.ai/prompt/${encodedPrompt}?width=512&height=512&nologo=true&enhance=true`;
            
            console.log('🖼️ URL картинки:', imageUrl);
            
            // Создаём изображение
            const img = new Image();
            img.onload = () => {
                pictureImg.src = imageUrl;
                if (imgDiv) imgDiv.innerText = '✨ Вот картинка к твоей истории:';
                console.log('✅ Картинка загружена');
            };
            img.onerror = (err) => {
                console.error('❌ Ошибка загрузки картинки:', err);
                if (imgDiv) imgDiv.innerText = '😔 Картинка не загрузилась, но ты молодец!';
                pictureImg.src = '';
            };
            img.src = imageUrl;
        }

        // Основная логика
        sendBtn.onclick = async () => {
            const text = userInput.value.trim();
            if (!text) return;
            userInput.value = '';
            addMessage('Ты', text);
            clearSuggestions();

            try {
                if (step === 0) {
                    childName = text;
                    addMessage('Буклик', `Приятно познакомиться, ${childName}! Ты мальчик или девочка?`);
                    showSuggestions(['мальчик', 'девочка']);
                    step = 1;
                }
                else if (step === 1) {
                    childGender = text.includes('мальчик') ? 'boy' : 'girl';
                    addMessage('Буклик', 'Кто будет главным героем?');
                    showSuggestions(['я', 'фея', 'дракон', 'принцесса', 'котёнок']);
                    step = 2;
                }
                else if (step === 2) {
                    hero = normalizeHero(text, childName, childGender);
                    addMessage('Буклик', 'Где происходит действие?');
                    showSuggestions(['в волшебном лесу', 'в замке', 'в космосе', 'на острове']);
                    step = 3;
                }
                else if (step === 3) {
                    place = text;
                    addMessage('Буклик', 'Кто друг героя?');
                    showSuggestions(['лисёнок', 'дракончик', 'фея', 'говорящий кот']);
                    step = 4;
                }
                else if (step === 4) {
                    friend = text;
                    const prompt = `Напиши первый абзац волшебной сказки для девочки 7 лет. 
                        Главный герой: ${hero}. 
                        Место действия: ${place}. 
                        Друг героя: ${friend}. 
                        Напиши 3-4 предложения, красиво, с заглавной буквы, с волшебством. 
                        История должна начинаться с "Жила-была".`;
                    const systemPrompt = 'Ты — детский писатель. Пиши красиво, грамотно, с волшебством.';
                    addMessage('Буклик', '✨ Сейчас придумаю...');
                    const firstParagraph = await callYandexGPT(prompt, systemPrompt);
                    if (firstParagraph) {
                        fullStory = [firstParagraph];
                        storyBlock.innerText = firstParagraph;
                        addMessage('Буклик', `Вот начало твоей сказки! Прочитай вслух, нажав на микрофон. Потом я нарисую картинку.`);
                        step = 5;
                    } else {
                        addMessage('Буклик', 'Что-то пошло не так. Давай попробуем ещё раз.');
                    }
                }
                else if (step === 5) {
                    if (fullStory.length > 0) {
                        console.log('🔍 Вызываем generatePicture. Абзац:', fullStory[currentParagraph]);
                        await generatePicture(fullStory[currentParagraph] || 'Сказка');
                        addMessage('Буклик', `Вот иллюстрация! Что будет дальше? Ты можешь выбрать.`);
                        showSuggestions(['нашли клад', 'встретили волшебника', 'попали в подземелье', 'спасли друга']);
                        step = 6;
                    }
                }
                else if (step === 6) {
                    const nextPrompt = `Продолжи сказку про ${hero} и ${friend}. 
                        Учти, что ребёнок сказал: "${text}". 
                        Напиши следующий абзац (3-4 предложения), развивай сюжет, добавляй волшебство.`;
                    addMessage('Буклик', '✨ Сейчас придумаю продолжение...');
                    const nextParagraph = await callYandexGPT(nextPrompt, 'Ты — детский писатель. Продолжи сказку.');
                    if (nextParagraph) {
                        fullStory.push(nextParagraph);
                        storyBlock.innerText = nextParagraph;
                        currentParagraph++;
                        if (currentParagraph >= 2) {
                            const endPrompt = `Напиши счастливый конец сказки про ${hero} и ${friend}. 
                                Они возвращаются домой, их ждут, всё хорошо. 3-4 предложения, тепло, волшебно.`;
                            addMessage('Буклик', '✨ Сейчас придумаю красивый финал...');
                            const ending = await callYandexGPT(endPrompt, 'Ты — детский писатель. Напиши тёплый финал.');
                            if (ending) {
                                fullStory.push(ending);
                                storyBlock.innerText = ending;
                                addMessage('Буклик', 'Вот и подошло наше приключение к концу. Ты настоящий сказочник!');
                                downloadBtn.style.display = 'inline-block';
                                step = 7;
                            }
                        } else {
                            addMessage('Буклик', 'Прочитай этот абзац вслух, и я нарисую картинку.');
                            step = 5;
                        }
                    }
                }
            } catch (error) {
                console.error('Ошибка:', error);
                addMessage('Буклик', 'Что-то пошло не так. Давай попробуем ещё раз.');
            }
        };

        // Микрофон
        if ('webkitSpeechRecognition' in window) {
            const rec = new webkitSpeechRecognition();
            rec.lang = 'ru-RU';
            rec.continuous = false;
            rec.interimResults = false;
            rec.onresult = (e) => {
                userInput.value = e.results[0][0].transcript;
                sendBtn.click();
            };
            rec.onerror = () => addMessage('Буклик', 'Не расслышал, попробуй ещё раз.');
            micBtn.onclick = () => rec.start();
        } else {
            micBtn.style.display = 'none';
        }

        // Скачивание PDF
        downloadBtn.onclick = async () => {
            try {
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF();
                const img = document.getElementById('buklikImg');
                const canvas = await html2canvas(img);
                const imgData = canvas.toDataURL('image/jpeg');
                pdf.addImage(imgData, 'JPEG', 10, 10, 40, 40);
                pdf.setFontSize(20);
                pdf.text('Волшебная книга', 60, 30);
                pdf.setFontSize(12);
                pdf.text(`Автор: ${childName}`, 60, 40);
                let y = 60;
                pdf.setFontSize(14);
                fullStory.forEach((p) => {
                    if (y > 270) { pdf.addPage(); y = 20; }
                    const lines = pdf.splitTextToSize(p, 170);
                    pdf.text(lines, 20, y);
                    y += lines.length * 7 + 5;
                });
                pdf.save('moja_volshebnaja_kniga.pdf');
            } catch (error) {
                console.error('Ошибка PDF:', error);
                alert('Не удалось создать PDF. Попробуй ещё раз.');
            }
        };
    })();
</script>
</body>
</html>
