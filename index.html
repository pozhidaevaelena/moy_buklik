<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>✨ Буклик ✨</title>
    <style>
        body {
            background: #7BC5AE;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            padding: 20px;
        }
        .box {
            max-width: 700px;
            margin: 0 auto;
            background: #FFF9E6;
            border-radius: 60px;
            padding: 30px 25px;
            border: 4px solid #FFB27F;
        }
        .story-block {
            background: #FFF0D9;
            border-radius: 40px;
            padding: 25px;
            margin: 20px 0;
            font-size: 1.8rem;
            border: 4px solid #FFB27F;
            min-height: 140px;
        }
        .picture-block {
            background: #FFE6D5;
            border-radius: 30px;
            padding: 20px;
            margin: 15px 0;
            border: 4px dashed #FFB27F;
            display: none;
        }
        .picture-block img {
            max-width: 100%;
            border-radius: 30px;
        }
        .chat {
            background: white;
            border-radius: 30px;
            padding: 20px;
            height: 250px;
            overflow-y: auto;
            border: 3px solid #FFCF9A;
            margin: 20px 0;
            text-align: left;
        }
        .message { margin: 12px 0; }
        .controls {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        input {
            flex: 1;
            padding: 15px;
            font-size: 1.3rem;
            border-radius: 50px;
            border: 3px solid #FFCF9A;
        }
        button {
            padding: 15px 25px;
            font-size: 1.3rem;
            border-radius: 50px;
            border: 3px solid #FFEAA2;
            background: #FFB27F;
            cursor: pointer;
        }
        #mic { background: #A7D0CD; }
    </style>
</head>
<body>
<div class="box">
    <h1>✨ Буклик ✨</h1>
    <div class="story-block" id="storyBlock">📖 Здесь появится твоя история...</div>
    <div class="picture-block" id="pictureBlock">
        <div>🎨 Волшебная иллюстрация:</div>
        <img id="generatedImage" src="" alt="Сгенерированная картинка">
    </div>
    <div class="chat" id="chat"></div>
    <div class="controls">
        <input type="text" id="userInput" placeholder="Напиши или нажми 🎤">
        <button id="send">📬</button>
        <button id="mic">🎤</button>
    </div>
</div>

<script>
    (function() {
        // ТВОИ ДАННЫЕ ИЗ ЯНДЕКС.ОБЛАКА
        const FOLDER_ID = 'b1gn9sn6rkl1p0mu04fd';
        const API_KEY = 'AQVNzlKjWgVtVQPnVsay-FZhka16HXeuPC8Wabv3';

        const chat = document.getElementById('chat');
        const storyBlock = document.getElementById('storyBlock');
        const pictureBlock = document.getElementById('pictureBlock');
        const generatedImage = document.getElementById('generatedImage');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('send');
        const micBtn = document.getElementById('mic');

        let step = 0;
        let childName = '';
        let hero = '', place = '', friend = '';
        let storyText = '';

        function addMessage(sender, text) {
            const msg = document.createElement('div');
            msg.className = 'message';
            msg.innerHTML = `<strong>${sender}:</strong> ${text}`;
            chat.appendChild(msg);
            chat.scrollTop = chat.scrollHeight;
        }

        async function generatePicture(prompt) {
            try {
                const response = await fetch('https://llm.api.cloud.yandex.net/foundationModels/v1/imageGeneration', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Api-Key ${API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        modelUri: `art://${FOLDER_ID}/yandex-art/latest`,
                        generationOptions: {
                            seed: 123,
                            aspectRatio: '1:1'
                        },
                        messages: [
                            {
                                role: 'user',
                                text: prompt
                            }
                        ]
                    })
                });
                const data = await response.json();
                return data.imageData; // Здесь будет ссылка на картинку
            } catch (error) {
                console.error('Ошибка генерации:', error);
                return null;
            }
        }

        addMessage('Буклик', '✨ Привет! Как тебя зовут?');

        sendBtn.onclick = () => {
            const text = userInput.value.trim();
            if (!text) return;
            addMessage('Ты', text);
            userInput.value = '';

            if (step === 0) {
                childName = text;
                addMessage('Буклик', `Приятно познакомиться, ${childName}! Кто будет героем?`);
                step = 1;
            } else if (step === 1) {
                hero = text;
                addMessage('Буклик', 'Где происходит история?');
                step = 2;
            } else if (step === 2) {
                place = text;
                addMessage('Буклик', 'Кто друг героя?');
                step = 3;
            } else if (step === 3) {
                friend = text;
                storyText = `Жила-была ${hero}. У неё был друг — ${friend}. Однажды они отправились в ${place}, где их ждали удивительные приключения.`;
                storyBlock.innerText = storyText;
                addMessage('Буклик', '✨ Вот твоя история! Прочитай её вслух, и я нарисую картинку.');

                // СРАЗУ ГЕНЕРИРУЕМ КАРТИНКУ
                const picture = await generatePicture(storyText);
                if (picture) {
                    generatedImage.src = picture;
                    pictureBlock.style.display = 'block';
                }
                step = 4;
            }
        };

        if ('webkitSpeechRecognition' in window) {
            const rec = new webkitSpeechRecognition();
            rec.lang = 'ru-RU';
            rec.onresult = (e) => {
                userInput.value = e.results[0][0].transcript;
                sendBtn.click();
            };
            micBtn.onclick = () => rec.start();
        }
    })();
</script>
</body>
</html>
