<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Буклик — волшебный друг ✨</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Comic Sans MS', cursive, sans-serif; }
        body {
            background: linear-gradient(145deg, #7BC5AE 0%, #B8E1D9 50%, #E6C5A8 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .app {
            max-width: 700px;
            width: 100%;
            background: rgba(255, 248, 235, 0.3);
            backdrop-filter: blur(8px);
            border-radius: 70px 70px 50px 50px;
            padding: 30px 25px 40px;
            box-shadow: 0 30px 50px rgba(92,55,20,0.3);
            border: 3px solid rgba(255,250,220,0.9);
            text-align: center;
        }
        h1 {
            font-size: 2.8rem;
            color: #3F2B1C;
            text-shadow: 4px 4px 0 #F9D77E;
            background: #FFF5E0;
            display: inline-block;
            padding: 12px 35px;
            border-radius: 90px;
            margin-bottom: 20px;
            border: 4px solid #FFCF9A;
        }
        .character-img {
            max-width: 200px;
            border-radius: 50px;
            border: 5px solid #FFEAC1;
            filter: drop-shadow(0 15px 20px rgba(110,70,20,0.2));
            animation: float 4s ease-in-out infinite;
            margin: 10px auto 20px;
        }
        @keyframes float { 50% { transform: translateY(-10px); } }
        .mission {
            background: rgba(255, 245, 215, 0.8);
            backdrop-filter: blur(2px);
            border-radius: 60px;
            padding: 18px 20px;
            margin: 0 10px 25px;
            border: 3px dashed #F1C78C;
            font-size: 1.3rem;
            color: #1F4E3D;
            line-height: 1.6;
        }
        .story-block {
            background: #FFF9E6;
            border-radius: 40px;
            padding: 25px;
            margin: 20px 0;
            border: 4px solid #FFB27F;
            font-size: 1.5rem;
            line-height: 1.8;
            color: #2B1404;
            box-shadow: inset 0 0 15px #FFEAC1;
            text-align: left;
        }
        .picture-block {
            background: #FFD9C0;
            border-radius: 30px;
            padding: 20px;
            margin: 15px 0;
            border: 4px dashed #FFB27F;
            display: none;
            text-align: center;
        }
        .picture-block img {
            max-width: 100%;
            border-radius: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .chat {
            background: rgba(255,255,240,0.9);
            border-radius: 30px;
            padding: 20px;
            height: 250px;
            overflow-y: auto;
            border: 3px solid #FFCF9A;
            margin: 20px 0;
            text-align: left;
            font-size: 1.2rem;
        }
        .message { margin: 10px 0; }
        .message.user { text-align: right; color: #2B1404; }
        .message.bot { text-align: left; color: #1F4E3D; }
        .input-area {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        input {
            flex: 1;
            padding: 15px;
            font-size: 1.2rem;
            border-radius: 40px;
            border: 3px solid #FFCF9A;
            outline: none;
        }
        button {
            padding: 15px 25px;
            font-size: 1.2rem;
            border-radius: 40px;
            border: 3px solid #FFEAA2;
            background: #FFB27F;
            cursor: pointer;
            font-weight: bold;
            transition: 0.1s;
            box-shadow: 0 4px 0 #A65629;
        }
        button:active { transform: translateY(3px); box-shadow: 0 1px 0 #A65629; }
        .mic { background: #A7D0CD; }
        .suggestions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 15px 0;
            justify-content: center;
        }
        .suggestion-btn {
            background: #FFF0D9;
            border: 2px solid #FFB27F;
            border-radius: 40px;
            padding: 10px 20px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.1s;
        }
        .suggestion-btn:hover { background: #FFB27F; color: white; }
        #download-btn {
            background: #D9B8C4;
            margin: 20px auto 0;
            display: none;
            padding: 15px 30px;
            border-radius: 60px;
            border: 4px solid #FFB27F;
            cursor: pointer;
            width: fit-content;
            font-weight: bold;
        }
        @media (max-width: 550px) {
            h1 { font-size: 2.2rem; }
            .mission { font-size: 1.1rem; }
            .story-block { font-size: 1.3rem; }
            button { padding: 12px 20px; font-size: 1rem; }
        }
    </style>
</head>
<body>
<div class="app">
    <h1>✨ Привет, я Буклик ✨</h1>
    <div class="mission">
        Я помогаю придумывать волшебные истории,<br>
        рисовать картинки и читать вслух.
    </div>
    <img src="moy_buklik.jpg" alt="Буклик" class="character-img" id="buklikImg">

    <div class="story-block" id="storyBlock">📖 Здесь появится твоя история...</div>
    <div class="picture-block" id="pictureBlock">
        <div>🎨 Волшебная картинка создаётся...</div>
        <img id="pictureImg" src="" alt="Иллюстрация">
    </div>
    <div class="chat" id="chat"></div>
    
    <div class="suggestions" id="suggestions"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Напиши или нажми микрофон">
        <button id="sendBtn">📬 Отправить</button>
        <button id="micBtn" class="mic">🎤 Микрофон</button>
    </div>

    <div id="download-btn">📥 Скачать книгу</div>
</div>

<script>
    (function() {
        // ==================== URL СЕРВЕРА ====================
        const API_URL = 'https://examples-beta-murex.vercel.app';
        // ====================================================

        const chat = document.getElementById('chat');
        const storyBlock = document.getElementById('storyBlock');
        const pictureBlock = document.getElementById('pictureBlock');
        const pictureImg = document.getElementById('pictureImg');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const micBtn = document.getElementById('micBtn');
        const downloadBtn = document.getElementById('download-btn');
        const suggestionsDiv = document.getElementById('suggestions');

        let step = 0;
        let childName = '';
        let childGender = '';
        let hero = '', place = '', friend = '';
        let fullStory = [];
        let fullImagePrompts = [];
        let currentParagraph = 0;
        let conversationHistory = [];

        // Словари имён
        const maleNames = ['александр', 'алексей', 'андрей', 'антон', 'артём', 'борис', 'вадим', 'валентин', 'валерий', 'василий', 'виктор', 'владимир', 'владислав', 'вячеслав', 'геннадий', 'георгий', 'герман', 'глеб', 'григорий', 'даниил', 'денис', 'дмитрий', 'евгений', 'егор', 'иван', 'игорь', 'илья', 'кирилл', 'константин', 'лев', 'леонид', 'максим', 'марк', 'матвей', 'михаил', 'никита', 'николай', 'олег', 'павел', 'пётр', 'платон', 'родион', 'роман', 'руслан', 'савва', 'святослав', 'семён', 'сергей', 'станислав', 'степан', 'тимофей', 'тимур', 'фёдор', 'филипп', 'юрий', 'яков', 'ярослав'];
        const femaleNames = ['александра', 'алина', 'алиса', 'алла', 'анастасия', 'ангелина', 'анна', 'антонина', 'валентина', 'валерия', 'варвара', 'вера', 'вероника', 'виктория', 'галина', 'дарина', 'дарья', 'диана', 'ева', 'евгения', 'екатерина', 'елена', 'елизавета', 'жанна', 'зинаида', 'зоя', 'инна', 'ирина', 'карина', 'кира', 'клавдия', 'ксения', 'лада', 'лариса', 'лидия', 'лилия', 'любовь', 'людмила', 'майя', 'маргарита', 'марина', 'мария', 'милена', 'надежда', 'настасья', 'наталья', 'нелли', 'нина', 'оксана', 'оливия', 'ольга', 'полина', 'раиса', 'рита', 'светлана', 'софия', 'софья', 'таисия', 'тамара', 'татьяна', 'ульяна', 'юлия'];
        
        function detectGender(name) {
            const lowerName = name.toLowerCase();
            if (maleNames.includes(lowerName)) return 'boy';
            if (femaleNames.includes(lowerName)) return 'girl';
            return null;
        }

        function addMessage(sender, text) {
            const msg = document.createElement('div');
            msg.className = `message ${sender === 'Буклик' ? 'bot' : 'user'}`;
            msg.innerHTML = `<strong>${sender}:</strong> ${text}`;
            chat.appendChild(msg);
            chat.scrollTop = chat.scrollHeight;
        }

        function showSuggestions(options) {
            suggestionsDiv.innerHTML = '';
            options.forEach(opt => {
                const btn = document.createElement('span');
                btn.className = 'suggestion-btn';
                btn.innerText = opt;
                btn.onclick = () => {
                    userInput.value = opt;
                    sendBtn.click();
                };
                suggestionsDiv.appendChild(btn);
            });
        }

        function clearSuggestions() { suggestionsDiv.innerHTML = ''; }
        function capitalizeFirstLetter(str) { return str.charAt(0).toUpperCase() + str.slice(1); }

        function parseJSONFromText(text) {
            try {
                const match = text.match(/\{[\s\S]*\}/);
                if (match) {
                    return JSON.parse(match[0]);
                }
            } catch (e) {
                console.error('Ошибка парсинга JSON:', e);
            }
            return null;
        }

        async function callYandexGPTJSON(prompt, system) {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: prompt,
                        history: conversationHistory,
                        system: system
                    })
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                let text = data.reply;
                if (!text || text === '...') return null;
                
                const jsonData = parseJSONFromText(text);
                if (jsonData && jsonData.story_text && jsonData.image_prompt) {
                    if (data.history) conversationHistory = data.history;
                    return jsonData;
                }
                return null;
            } catch (error) {
                console.error('Ошибка YandexGPT:', error);
                return null;
            }
        }

        // ========== ГЕНЕРАЦИЯ КАРТИНОК С ОТЛАДКОЙ ==========
      async function generatePicture(prompt) {
    console.log('🔍 Генерация картинки по промту:', prompt);
    
    pictureBlock.style.display = 'block';
    pictureImg.src = '';
    const imgDiv = pictureBlock.querySelector('div');
    if (imgDiv) imgDiv.innerText = '🎨 Волшебная картинка создаётся...';

    // Формируем URL как в PollenPages
    const encodedPrompt = encodeURIComponent(prompt);
    const imageUrl = `https://image.pollinations.ai/prompt/${encodedPrompt}?width=512&height=512&nologo=true&model=flux`;
    
    console.log('🖼️ URL картинки:', imageUrl);
    
    const img = new Image();
    img.onload = () => {
        pictureImg.src = imageUrl;
        if (imgDiv) imgDiv.innerText = '✨ Вот картинка к твоей истории:';
        console.log('✅ Картинка загружена');
    };
    img.onerror = (err) => {
        console.error('❌ Ошибка загрузки картинки:', err);
        if (imgDiv) imgDiv.innerText = '😔 Картинка не загрузилась, но ты молодец!';
        pictureImg.src = '';
    };
    img.src = imageUrl;
}
        // Основная логика
        sendBtn.onclick = async () => {
            const text = userInput.value.trim();
            if (!text) return;
            userInput.value = '';
            addMessage('Ты', text);
            clearSuggestions();

            try {
                if (step === 0) {
                    childName = text;
                    const detected = detectGender(childName);
                    if (detected) {
                        childGender = detected;
                        addMessage('Буклик', `Приятно познакомиться, ${childName}!`);
                        addMessage('Буклик', 'Кто будет главным героем?');
                        showSuggestions(['я', 'фея', 'дракон', 'принцесса', 'котёнок']);
                        step = 2;
                    } else {
                        addMessage('Буклик', `Приятно познакомиться, ${childName}! Ты мальчик или девочка?`);
                        showSuggestions(['мальчик', 'девочка']);
                        step = 1;
                    }
                }
                else if (step === 1) {
                    childGender = text.includes('мальчик') ? 'boy' : 'girl';
                    addMessage('Буклик', 'Кто будет главным героем?');
                    showSuggestions(['я', 'фея', 'дракон', 'принцесса', 'котёнок']);
                    step = 2;
                }
                else if (step === 2) {
                    const lower = text.toLowerCase().trim();
                    if (lower === 'я' || lower === 'я сама' || lower === 'я сам') {
                        hero = childGender === 'boy' ? `мальчик ${childName}` : `девочка ${childName}`;
                    } else {
                        hero = text;
                    }
                    addMessage('Буклик', 'Где происходит действие?');
                    showSuggestions(['в волшебном лесу', 'в замке', 'в космосе', 'на острове']);
                    step = 3;
                }
                else if (step === 3) {
                    place = text;
                    addMessage('Буклик', 'Кто друг героя?');
                    showSuggestions(['лисёнок', 'дракончик', 'фея', 'говорящий кот']);
                    step = 4;
                }
                else if (step === 4) {
                    friend = text;
                    
                    const prompt = `Ты — детский писатель. Напиши первый абзац волшебной сказки для девочки 7 лет.
                        Главный герой: ${hero}. 
                        Место действия: ${place}. 
                        Друг героя: ${friend}. 
                        Важно: история ДОЛЖНА быть именно про ${hero} (а не про другого героя).
                        Также придумай короткий промт для иллюстрации к этому абзацу (3-5 слов).
                        Верни ответ строго в формате JSON:
                        {
                            "story_text": "текст абзаца",
                            "image_prompt": "короткое описание для картинки"
                        }`;
                    
                    const systemPrompt = 'Ты — детский писатель. Пиши красиво, грамотно, с волшебством. Всегда возвращай только JSON.';
                    addMessage('Буклик', '✨ Сейчас придумаю...');
                    const jsonResult = await callYandexGPTJSON(prompt, systemPrompt);
                    
                    if (jsonResult) {
                        fullStory.push(jsonResult.story_text);
                        fullImagePrompts.push(jsonResult.image_prompt);
                        storyBlock.innerText = jsonResult.story_text;
                        addMessage('Буклик', `Вот начало твоей сказки! Прочитай вслух, нажав на микрофон.`);
                        addMessage('Буклик', `Когда прочитаешь — я скажу, получилось ли, и нарисую картинку.`);
                        step = 5;
                    } else {
                        addMessage('Буклик', 'Что-то пошло не так. Давай попробуем ещё раз.');
                    }
                }
                else if (step === 5) {
                    addMessage('Буклик', '🎉 Умница! Ты замечательно прочитала!');
                    if (fullImagePrompts.length > currentParagraph) {
                        await generatePicture(fullImagePrompts[currentParagraph]);
                        addMessage('Буклик', `Вот иллюстрация! Что будет дальше? Ты можешь выбрать.`);
                        showSuggestions(['нашли клад', 'встретили волшебника', 'попали в подземелье', 'спасли друга']);
                        step = 6;
                    }
                }
                else if (step === 6) {
                    const nextPrompt = `Продолжи сказку про ${hero} и ${friend}. 
                        Учти, что ребёнок сказал: "${text}". 
                        Напиши следующий абзац (3-4 предложения), развивай сюжет, добавляй волшебство.
                        Также придумай короткий промт для иллюстрации к этому абзацу (3-5 слов).
                        Верни ответ строго в формате JSON:
                        {
                            "story_text": "текст абзаца",
                            "image_prompt": "короткое описание для картинки"
                        }`;
                    addMessage('Буклик', '✨ Сейчас придумаю продолжение...');
                    const jsonResult = await callYandexGPTJSON(nextPrompt, 'Ты — детский писатель. Продолжи сказку. Всегда возвращай только JSON.');
                    
                    if (jsonResult) {
                        fullStory.push(jsonResult.story_text);
                        fullImagePrompts.push(jsonResult.image_prompt);
                        storyBlock.innerText = jsonResult.story_text;
                        currentParagraph++;
                        
                        if (currentParagraph >= 2) {
                            const endPrompt = `Напиши счастливый конец сказки про ${hero} и ${friend}. 
                                Они возвращаются домой, их ждут, всё хорошо. 3-4 предложения, тепло, волшебно.
                                Также придумай короткий промт для иллюстрации к финалу.
                                Верни ответ строго в формате JSON:
                                {
                                    "story_text": "текст абзаца",
                                    "image_prompt": "короткое описание для картинки"
                                }`;
                            addMessage('Буклик', '✨ Сейчас придумаю красивый финал...');
                            const endJson = await callYandexGPTJSON(endPrompt, 'Ты — детский писатель. Напиши тёплый финал. Всегда возвращай только JSON.');
                            if (endJson) {
                                fullStory.push(endJson.story_text);
                                fullImagePrompts.push(endJson.image_prompt);
                                storyBlock.innerText = endJson.story_text;
                                addMessage('Буклик', 'Вот и подошло наше приключение к концу. Ты настоящий сказочник!');
                                downloadBtn.style.display = 'inline-block';
                                step = 7;
                            }
                        } else {
                            addMessage('Буклик', 'Прочитай этот абзац вслух, и я нарисую картинку.');
                            step = 5;
                        }
                    }
                }
            } catch (error) {
                console.error('Ошибка:', error);
                addMessage('Буклик', 'Что-то пошло не так. Давай попробуем ещё раз.');
            }
        };

        // Микрофон
        if ('webkitSpeechRecognition' in window) {
            const rec = new webkitSpeechRecognition();
            rec.lang = 'ru-RU';
            rec.continuous = false;
            rec.interimResults = false;
            rec.onresult = (e) => {
                userInput.value = e.results[0][0].transcript;
                sendBtn.click();
            };
            rec.onerror = () => addMessage('Буклик', 'Не расслышал, попробуй ещё раз.');
            micBtn.onclick = () => rec.start();
        } else {
            micBtn.style.display = 'none';
        }

        // Скачивание PDF
        downloadBtn.onclick = async () => {
            try {
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF();
                const img = document.getElementById('buklikImg');
                const canvas = await html2canvas(img);
                const imgData = canvas.toDataURL('image/jpeg');
                pdf.addImage(imgData, 'JPEG', 10, 10, 40, 40);
                pdf.setFontSize(20);
                pdf.text('Волшебная книга', 60, 30);
                pdf.setFontSize(12);
                pdf.text(`Автор: ${childName}`, 60, 40);
                let y = 60;
                pdf.setFontSize(14);
                fullStory.forEach((p) => {
                    if (y > 270) { pdf.addPage(); y = 20; }
                    const lines = pdf.splitTextToSize(p, 170);
                    pdf.text(lines, 20, y);
                    y += lines.length * 7 + 5;
                });
                pdf.save('moja_volshebnaja_kniga.pdf');
            } catch (error) {
                console.error('Ошибка PDF:', error);
                alert('Не удалось создать PDF. Попробуй ещё раз.');
            }
        };
    })();
</script>
</body>
</html>
